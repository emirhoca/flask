name: Testmon Check
on:
  push:
  pull_request:
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Cache testmon data
        uses: actions/cache@v4
        with:
          path: .testmondata
          key: testmon-${{ github.ref }}
          restore-keys: |
            testmon-
      - name: Testmon DB size (before)
        run: |
          db_size=$(python -c "import os; print(os.path.getsize('.testmondata')) if os.path.exists('.testmondata') else print(0)")
          echo "Testmon DB size (before tests): ${db_size} bytes"
      - name: Run pytest-testmon
        run: |
          start=$(date +%s)
          uv run pytest --testmon -v --durations=0
          end=$(date +%s)
          echo "Testmon duration: $((end - start)) seconds"
      - name: Testmon DB size (after)
        run: |
          db_size=$(python -c "import os; print(os.path.getsize('.testmondata')) if os.path.exists('.testmondata') else print(0)")
          echo "Testmon DB size (after tests): ${db_size} bytes"
