name: Tests (pytest + ezmon)
on:
  pull_request:
    paths-ignore: ['docs/**', 'README.md']
  push:
    branches: [main, stable]
    paths-ignore: ['docs/**', 'README.md']
  workflow_dispatch:

env:
  TESTMON_NET_ENABLED: "true"
  TESTMON_SERVER: "https://ezmon.aloiz.ch"
jobs:
  tests:
    name: ${{ matrix.name || matrix.python }}
    runs-on: ${{ matrix.os || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {python: '3.13'}
          - {name: Windows, python: '3.13', os: windows-latest}
          - {name: Mac, python: '3.13', os: macos-latest}
          - {python: '3.12'}
          - {python: '3.11'}
          - {python: '3.10'}
          - {name: PyPy, python: 'pypy-3.11', tox: pypy3.11}
          - {name: Minimum Versions, python: '3.13', tox: tests-min}
          - {name: Development Versions, python: '3.10', tox: tests-dev}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: astral-sh/setup-uv@d9e0f98d3fc6adb07d1e3d37f3043649ddad06a1 # v6.5.0
        with:
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}
      - run: uv run --locked tox run -e ${{ matrix.tox || format('py{0}', matrix.python) }}
  typing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: astral-sh/setup-uv@d9e0f98d3fc6adb07d1e3d37f3043649ddad06a1 # v6.5.0
        with:
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: pyproject.toml
      - name: cache mypy
        uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ./.mypy_cache
          key: mypy|${{ hashFiles('pyproject.toml') }}
      - run: uv run --locked tox run -e typing

  ezmon:
    name: "pytest --ezmon (NetDB)"
    runs-on: macos-latest
    env:
      PY_VERSION: "3.12"
      REPO_ID: ${{ github.repository }}
      JOB_ID: "python-3.12-macos"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PY_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then
            pip install .
          else
            echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
          fi
          pip install "git+https://github.com/andreas16700/pytest-testmon@main"
          pip install pytest-json-report

      - name: Debug ezmon setup
        run: |
          pip list | grep -i testmon
          echo "NetDB enabled: $TESTMON_NET_ENABLED"
          echo "Server: $TESTMON_SERVER"
          echo "Repo ID: $REPO_ID"
          echo "Job ID: $JOB_ID"

      - name: Run tests with ezmon (NetDB)
        run: |
          # Collect all test nodeids without ezmon filter
          pytest --collect-only -q --no-header 2>/dev/null \
            | grep "::" > all-tests.txt || true

          # Run with ezmon + json report
          pytest --ezmon -v \
            --json-report \
            --json-report-file=test-report.json || true

          # Inject deselected tests + commit metadata
          python3 -c "
          import json, os

          with open('all-tests.txt') as f:
              all_tests = [l.strip() for l in f if '::' in l.strip()]

          with open('test-report.json') as f:
              report = json.load(f)

          ran = {t['nodeid'] for t in report.get('tests', [])}
          for nodeid in all_tests:
              if nodeid not in ran:
                  report['tests'].append({
                      'nodeid': nodeid,
                      'outcome': 'deselected',
                      'duration': 0.0
                  })

          report['summary']['deselected'] = len(all_tests) - len(ran)
          report['commit_id'] = os.environ['GITHUB_SHA']
          report['repo_id'] = os.environ['GITHUB_REPOSITORY']

          with open('test-report.json', 'w') as f:
              json.dump(report, f, indent=2)
          "

      - name: Print test report JSON
        if: always()
        run: cat test-report.json

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ env.JOB_ID }}-${{ github.sha }}
          path: test-report.json
